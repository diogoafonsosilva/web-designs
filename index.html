<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Diogo Silva | Portfólio</title>
  <meta name="description" content="Portfólio de projetos em marketing, web e comunicação digital." />

  <!-- Open Graph (quando partilhas no LinkedIn) -->
  <meta property="og:title" content="Diogo Silva | Portfólio" />
  <meta property="og:description" content="Projetos de marketing, web e comunicação digital." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://diogoafonsosilva.github.io/web-designs/" />

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      background: #f5f5f5;
      color: #111;
      line-height: 1.6;
    }

    header {
      padding: 80px 20px 40px;
      text-align: center;
    }

    header h1 {
      font-size: 3.5rem;
      margin-bottom: 12px;
      letter-spacing: -1px;
    }

    header p {
      font-size: 1.2rem;
      color: #444;
      max-width: 700px;
      margin: 0 auto;
    }

    main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 20px 20px 60px;
    }

    h2 {
      font-size: 2rem;
      margin-bottom: 30px;
    }

    .projects {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 24px;
    }

    .card {
      background: #fff;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.06);
      transition: 0.25s ease;
    }

    .card:hover {
      transform: translateY(-6px);
      box-shadow: 0 14px 32px rgba(0, 0, 0, 0.12);
    }

    .card img {
      width: 100%;
      height: 200px;
      object-fit: cover;
      display: block;
    }

    .card-content {
      padding: 24px;
    }

    .card h3 {
      font-size: 1.8rem;
      margin-bottom: 10px;
    }

    .card p {
      font-size: 1rem;
      color: #555;
      margin-bottom: 20px;
    }

    .btn {
      display: inline-block;
      text-decoration: none;
      background: #111;
      color: #fff;
      padding: 12px 18px;
      border-radius: 10px;
      font-weight: 600;
      transition: 0.2s;
    }

    .btn:hover {
      background: #333;
    }

    footer {
      text-align: center;
      padding: 40px 20px;
      color: #777;
      font-size: 0.9rem;
    }

    @media (max-width: 768px) {
      header h1 {
        font-size: 2.4rem;
      }
    }
  </style>
</head>

<body>

  <header>
    <h1>Diogo Silva</h1>
    <p>Portfólio de projetos em marketing, web e comunicação digital.</p>
  </header>

  <main>
    <h2>Projetos</h2>

    <section class="projects">

      <!-- McLaren -->
      <article class="card">
        <img src="McLarenSite/imagens/mclaren.png" alt="Projeto McLaren">
        <div class="card-content">
          <h3>McLaren</h3>
          <p>Projeto com foco visual, storytelling e apresentação de marca.</p>
          <a class="btn" href="McLarenSite/McLaren.html">Ver projeto</a>
        </div>
      </article>

      <!-- SneakerStreet -->
      <article class="card">
        <img src="SneakerStore/imagens/nnd.png" alt="Projeto SneakerStreet">
        <div class="card-content">
          <h3>SneakerStreet</h3>
          <p>Website com identidade própria e abordagem comercial.</p>
          <a class="btn" href="SneakerStore/SneakerStreet.html">Ver projeto</a>
        </div>
      </article>

    </section>
  </main>

  <footer>
    <p>© 2026 Diogo Silva</p>
  </footer>

</body>
</html>
